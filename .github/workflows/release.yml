name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: rask-linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: rask-linux-aarch64
          - os: macos-13
            target: x86_64-apple-darwin
            artifact: rask-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: rask-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          compiler/target/
        key: ${{ runner.os }}-${{ matrix.target }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

    - name: Build C runtime
      run: make -C compiler/runtime

    - name: Build compiler
      run: cargo build --release -p rask-cli
      working-directory: compiler

    - name: Package binary
      run: |
        cp compiler/target/release/rask ${{ matrix.artifact }}
        chmod +x ${{ matrix.artifact }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact }}
        path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Generate changelog
      id: changelog
      run: |
        PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
        if [ -z "$PREV_TAG" ]; then
          echo "body=Initial release" >> "$GITHUB_OUTPUT"
        else
          LOG=$(git log --oneline "$PREV_TAG"..HEAD --no-merges)
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$LOG"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"
        fi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        body: ${{ steps.changelog.outputs.body }}
        files: artifacts/**/*
